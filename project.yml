name: AetherReader
options:
  bundleIdPrefix: com.aether
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "26.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.2"
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  AetherReader:
    type: application
    platform: macOS
    sources:
      - path: AetherReader
    settings:
      base:
        INFOPLIST_FILE: AetherReader/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.aether.reader
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: AetherReader/Info.plist
      properties:
        CFBundleDisplayName: Aether Reader
        CFBundleName: AetherReader
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        LSSupportsOpeningDocumentsInPlace: true
        CFBundleDocumentTypes:
          - CFBundleTypeName: PDF Document
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - com.adobe.pdf
