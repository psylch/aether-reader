name: AetherReader
options:
  bundleIdPrefix: com.aether
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "26.0"
  minimumXcodeGenVersion: "2.42.0"
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: 1
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: true

packages:
  swift-snapshot-testing:
    url: https://github.com/pointfreeco/swift-snapshot-testing
    from: "1.17.0"

targets:
  AetherReader:
    type: application
    platform: macOS
    sources:
      - AetherReader
    settings:
      base:
        PRODUCT_NAME: AetherReader
        PRODUCT_MODULE_NAME: AetherReader
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.productivity"
        INFOPLIST_KEY_CFBundleDisplayName: "Aether Reader"
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026 Aether. All rights reserved."
    entitlements:
      path: AetherReader/AetherReader.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.files.bookmarks.app-scope: true
        com.apple.security.print: true
    scheme:
      testTargets:
        - AetherReaderTests
        - AetherReaderUITests

  AetherReaderTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - AetherReaderTests
    dependencies:
      - target: AetherReader
      - package: swift-snapshot-testing
        product: SnapshotTesting
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        PRODUCT_NAME: AetherReaderTests
        PRODUCT_MODULE_NAME: AetherReaderTests

  AetherReaderUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - AetherReaderUITests
    dependencies:
      - target: AetherReader
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        PRODUCT_NAME: AetherReaderUITests
        PRODUCT_MODULE_NAME: AetherReaderUITests
        TEST_TARGET_NAME: AetherReader
